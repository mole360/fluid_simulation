<!DOCTYPE html>
<html lang="sk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fluid Image — Interactive Liquid Simulation</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Bodoni+Moda:ital,wght@0,400;0,700;1,400&display=swap');

  :root {
    --bg: #0a0a0f;
    --ink: #f5f1e8;
    --accent: #ff3d5a;
    --accent2: #4fd1c5;
    --panel: rgba(20,20,28,0.92);
    --border: rgba(245,241,232,0.13);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  html, body {
    height: 100%; overflow: hidden;
    background: var(--bg); color: var(--ink);
    font-family: 'Space Mono', monospace; cursor: crosshair;
  }

  body::before {
    content: ''; position: fixed; inset: 0;
    background:
      radial-gradient(circle at 20% 30%, rgba(255,61,90,0.07), transparent 50%),
      radial-gradient(circle at 80% 70%, rgba(79,209,197,0.07), transparent 50%);
    pointer-events: none; z-index: 0;
  }

  #stage {
    position: relative; width: 100vw; height: 100vh;
    display: flex; align-items: center; justify-content: center; z-index: 1;
  }

  canvas {
    display: block; max-width: 90vw; max-height: 78vh;
    border: 1px solid var(--border);
    box-shadow: 0 0 0 1px rgba(255,61,90,0.1), 0 20px 80px rgba(0,0,0,0.6);
    background: #000;
  }

  header {
    position: fixed; top: 0; left: 0; right: 0; padding: 18px 28px;
    display: flex; justify-content: space-between; align-items: center;
    z-index: 10; background: linear-gradient(to bottom, rgba(10,10,15,0.9), transparent);
    pointer-events: none;
  }
  header > * { pointer-events: auto; }

  .brand { font-family: 'Bodoni Moda', serif; font-style: italic; font-size: 28px; font-weight: 400; }
  .brand span { color: var(--accent); font-weight: 700; }

  .back-btn {
    font-family: 'Space Mono', monospace; font-size: 12px;
    text-transform: uppercase; letter-spacing: 2px; color: var(--ink);
    text-decoration: none; padding: 10px 18px; border: 1px solid var(--border);
    background: var(--panel); backdrop-filter: blur(10px); transition: all 0.3s;
  }
  .back-btn:hover { border-color: var(--accent); color: var(--accent); transform: translateX(-3px); }

  .panel {
    position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%);
    background: var(--panel); backdrop-filter: blur(20px); border: 1px solid var(--border);
    padding: 18px 24px; z-index: 10;
    display: flex; align-items: center; gap: 20px; flex-wrap: wrap; max-width: 95vw;
  }

  .control { display: flex; flex-direction: column; gap: 5px; min-width: 100px; }
  .control label { font-size: 9px; text-transform: uppercase; letter-spacing: 2px; opacity: 0.55; }
  .control .val { font-size: 11px; color: var(--accent2); font-weight: 700; }

  input[type="range"] {
    -webkit-appearance: none; appearance: none;
    width: 100%; height: 2px; background: rgba(245,241,232,0.18); outline: none; cursor: pointer;
  }
  input[type="range"]::-webkit-slider-thumb {
    -webkit-appearance: none; width: 12px; height: 12px;
    background: var(--accent); border-radius: 50%; cursor: pointer;
  }
  input[type="range"]::-moz-range-thumb {
    width: 12px; height: 12px; background: var(--accent); border: none; border-radius: 50%;
  }

  .modes { display: flex; border: 1px solid var(--border); }
  .modes button {
    background: transparent; color: var(--ink); border: none;
    border-right: 1px solid var(--border); padding: 9px 13px;
    font-family: 'Space Mono', monospace; font-size: 10px;
    text-transform: uppercase; letter-spacing: 1.5px; cursor: pointer; transition: all 0.2s;
  }
  .modes button:last-child { border-right: none; }
  .modes button:hover { background: rgba(255,61,90,0.1); }
  .modes button.active { background: var(--accent); color: var(--bg); }

  .btn {
    font-family: 'Space Mono', monospace; font-size: 11px;
    text-transform: uppercase; letter-spacing: 1.5px; padding: 10px 15px;
    background: transparent; color: var(--ink); border: 1px solid var(--border);
    cursor: pointer; transition: all 0.25s;
  }
  .btn:hover { border-color: var(--accent); color: var(--accent); }
  .btn-primary { background: var(--accent); color: var(--bg); border-color: var(--accent); }
  .btn-primary:hover { background: transparent; color: var(--accent); }

  .dropzone {
    position: fixed; inset: 0; background: rgba(10,10,15,0.97); backdrop-filter: blur(20px);
    z-index: 100; display: flex; align-items: center; justify-content: center;
    flex-direction: column; text-align: center; transition: opacity 0.4s;
  }
  .dropzone.hidden { opacity: 0; pointer-events: none; }
  .dropzone-inner { border: 2px dashed var(--border); padding: 70px 90px; transition: all 0.3s; max-width: 580px; }
  .dropzone.dragover .dropzone-inner { border-color: var(--accent); background: rgba(255,61,90,0.05); transform: scale(1.02); }
  .dropzone h1 {
    font-family: 'Bodoni Moda', serif; font-style: italic; font-weight: 400;
    font-size: 68px; line-height: 1; margin-bottom: 18px; letter-spacing: -2px;
  }
  .dropzone h1 span { color: var(--accent); }
  .dropzone p { font-size: 12px; text-transform: uppercase; letter-spacing: 3px; opacity: 0.55; margin-bottom: 32px; }
  .upload-btn {
    display: inline-block; background: var(--accent); color: var(--bg);
    padding: 15px 34px; font-size: 11px; text-transform: uppercase;
    letter-spacing: 2px; cursor: pointer; font-weight: 700; transition: all 0.3s;
  }
  .upload-btn:hover { background: var(--ink); }
  .hint { margin-top: 28px; font-size: 10px; letter-spacing: 2px; opacity: 0.35; }

  .fps { position: fixed; top: 76px; left: 28px; font-size: 10px; letter-spacing: 2px; color: var(--accent2); opacity: 0.65; z-index: 5; }
  .info { position: fixed; top: 50%; right: 24px; transform: translateY(-50%) rotate(90deg); transform-origin: right center; font-size: 9px; letter-spacing: 4px; text-transform: uppercase; opacity: 0.25; z-index: 5; white-space: nowrap; }

  @media (max-width: 768px) {
    .dropzone h1 { font-size: 40px; }
    .dropzone-inner { padding: 44px 24px; }
    .panel { padding: 12px; gap: 10px; }
    .control { min-width: 75px; }
    .brand { font-size: 20px; }
  }
</style>
</head>
<body>

<header>
  <div class="brand">Fluid<span>Image</span></div>
  <a href="/" class="back-btn">&#8592; Sp&#228;&#357; na port&#225;l</a>
</header>

<div class="fps" id="fps">&#8212; FPS</div>
<div class="info">ŤAHAJ · PRAVÝ KLIK UPOKOJÍ</div>

<div id="stage">
  <canvas id="canvas"></canvas>
</div>

<div class="dropzone" id="dropzone">
  <div class="dropzone-inner">
    <h1>Make your image<br><span>liquid.</span></h1>
    <p>Drop an image · Watch it flow</p>
    <label class="upload-btn" for="fileInput">Vybrať obrázok</label>
    <input type="file" id="fileInput" accept="image/*" style="display:none;">
    <div class="hint">alebo presuň súbor sem</div>
  </div>
</div>

<div class="panel" id="panel" style="display:none;">
  <div class="modes">
    <button data-mode="normal" class="active">Normal</button>
    <button data-mode="velocity">Velocity</button>
    <button data-mode="ink">Ink</button>
  </div>

  <div class="control">
    <label>Brush Size</label>
    <input type="range" id="sBrush" min="5" max="100" value="35">
    <div class="val" id="vBrush">35</div>
  </div>

  <div class="control">
    <label>Force</label>
    <input type="range" id="sForce" min="1" max="30" value="10">
    <div class="val" id="vForce">10</div>
  </div>

  <div class="control">
    <label>Viscosity</label>
    <input type="range" id="sViscosity" min="80" max="99" value="93">
    <div class="val" id="vViscosity">93</div>
  </div>

  <div class="control">
    <label>Max Stretch</label>
    <input type="range" id="sMaxDisplace" min="5" max="150" value="40">
    <div class="val" id="vMaxDisplace">40 px</div>
  </div>

  <button class="btn" id="btnReset">Reset</button>
  <button class="btn" id="btnNew">Nový obrázok</button>
  <button class="btn btn-primary" id="btnSave">Uložiť PNG</button>
</div>

<script>
/* =================================================================
   FLUID IMAGE — Liquid Smear Simulation
   Princíp: displacement field + inverzné bilineárne vzorkovanie
   - Pohyb nastáva LEN keď sa myš pohybuje (nie pri stoji)
   - Každý pixel má svoju velocity a displacement
   - Keď displacement > maxDisplace, pružina ho ťahá späť
   ================================================================= */

const canvas    = document.getElementById('canvas');
const ctx       = canvas.getContext('2d', { willReadFrequently: true });
const dropzone  = document.getElementById('dropzone');
const fileInput = document.getElementById('fileInput');
const panel     = document.getElementById('panel');
const fpsEl     = document.getElementById('fps');

let W = 0, H = 0;
let origData   = null;
let outImgData = null;

// Displacement a velocity — každý pixel má svoju hodnotu
let dX = null, dY = null;  // displacement (o koľko je pixel posunutý od originálu)
let vX = null, vY = null;  // velocity (aktuálna rýchlosť pohybu)

// Parametre
let brushSize   = 35;
let forceMul    = 10;
let viscosity   = 0.93;
let maxDisplace = 40;
let mode        = 'normal';

// Myš — sledujeme pohyb medzi framami
let mouse = { x: 0, y: 0, px: 0, py: 0, down: false, btn: 0 };

// Loop
let running = false, frameCount = 0;
let lastT = performance.now(), fpsAcc = 0, fpsCnt = 0;

/* ---- Načítanie obrázka ---- */

function loadFile(file) {
  if (!file || !file.type.startsWith('image/')) return;
  const reader = new FileReader();
  reader.onload = e => {
    const img = new Image();
    img.onload = () => initImage(img);
    img.src = e.target.result;
  };
  reader.readAsDataURL(file);
}

function initImage(img) {
  const MAX = 750;
  let w = img.width, h = img.height;
  if (w > MAX || h > MAX) {
    if (w >= h) { h = Math.round(h * MAX / w); w = MAX; }
    else         { w = Math.round(w * MAX / h); h = MAX; }
  }
  W = w; H = h;
  canvas.width = W; canvas.height = H;
  ctx.drawImage(img, 0, 0, W, H);
  origData   = ctx.getImageData(0, 0, W, H);
  outImgData = ctx.createImageData(W, H);

  const N = W * H;
  dX = new Float32Array(N); dY = new Float32Array(N);
  vX = new Float32Array(N); vY = new Float32Array(N);

  dropzone.classList.add('hidden');
  setTimeout(() => { dropzone.style.display = 'none'; }, 420);
  panel.style.display = 'flex';

  if (!running) { running = true; requestAnimationFrame(loop); }
}

function resetSim() {
  if (!dX) return;
  dX.fill(0); dY.fill(0); vX.fill(0); vY.fill(0);
  outImgData = ctx.createImageData(W, H);
  ctx.putImageData(origData, 0, 0);
}

/* ---- Aplikovanie sily myšou ---- */

function applyForce() {
  // Delta pohybu myši od minulého framu
  const mdx = mouse.x - mouse.px;
  const mdy = mouse.y - mouse.py;
  const moveLen = Math.sqrt(mdx * mdx + mdy * mdy);

  // Ak sa myš nepohla viac ako 0.3px — nič nerobíme
  // Toto zaistí že pri stoji sa nič nehýbe
  if (moveLen < 0.3) return;

  // Normalizovaný smer pohybu myši
  const nx = mdx / moveLen;
  const ny = mdy / moveLen;

  // Sila závisí od rýchlosti pohybu myši
  const power = Math.min(moveLen, 20) * forceMul * 0.07;

  const cx = mouse.x, cy = mouse.y;
  const r  = brushSize, r2 = r * r;

  const x0 = Math.max(0, Math.floor(cx - r));
  const x1 = Math.min(W - 1, Math.ceil(cx + r));
  const y0 = Math.max(0, Math.floor(cy - r));
  const y1 = Math.min(H - 1, Math.ceil(cy + r));

  for (let y = y0; y <= y1; y++) {
    for (let x = x0; x <= x1; x++) {
      const dx = x - cx, dy = y - cy;
      const d2 = dx * dx + dy * dy;
      if (d2 > r2) continue;
      // Kvadratický falloff — plynulý prechod od stredu k okraju
      const t = 1 - d2 / r2;
      const falloff = t * t;
      const i = y * W + x;
      vX[i] += nx * power * falloff;
      vY[i] += ny * power * falloff;
    }
  }
}

function applyCalm() {
  const cx = mouse.x, cy = mouse.y;
  const r = brushSize, r2 = r * r;
  const x0 = Math.max(0, Math.floor(cx - r));
  const x1 = Math.min(W - 1, Math.ceil(cx + r));
  const y0 = Math.max(0, Math.floor(cy - r));
  const y1 = Math.min(H - 1, Math.ceil(cy + r));
  for (let y = y0; y <= y1; y++) {
    for (let x = x0; x <= x1; x++) {
      const dx = x - cx, dy = y - cy;
      const d2 = dx * dx + dy * dy;
      if (d2 > r2) continue;
      const falloff = 1 - d2 / r2;
      const i = y * W + x;
      vX[i] *= (1 - falloff * 0.9);
      vY[i] *= (1 - falloff * 0.9);
      dX[i] *= (1 - falloff * 0.15);
      dY[i] *= (1 - falloff * 0.15);
    }
  }
}

/* ---- Simulačný krok ---- */

function step() {
  const N = W * H;

  for (let i = 0; i < N; i++) {
    // Integruj velocity do displacement
    dX[i] += vX[i];
    dY[i] += vY[i];

    // Vzdialenosť od pôvodnej pozície
    const dist = Math.sqrt(dX[i] * dX[i] + dY[i] * dY[i]);

    if (dist > 0.01) {
      const inv = 1 / dist;
      let spring = 0;

      if (dist > maxDisplace) {
        // Prekročil limit — silná pružina ťahá späť
        spring = (dist - maxDisplace) * 0.12 + 0.03;
      } else {
        // Pod limitom — slabá pasívna pružina (pomalý návrat)
        spring = dist * 0.003;
      }

      vX[i] -= dX[i] * inv * spring;
      vY[i] -= dY[i] * inv * spring;
    }

    // Viskozita (útlm)
    vX[i] *= viscosity;
    vY[i] *= viscosity;

    // Zastav mikro-vibrácie
    if (Math.abs(vX[i]) < 0.0008) vX[i] = 0;
    if (Math.abs(vY[i]) < 0.0008) vY[i] = 0;
  }

  // Difúzia velocity každé 2 framy (šíri pohyb do okolia)
  if ((frameCount & 1) === 0) {
    for (let y = 1; y < H - 1; y++) {
      for (let x = 1; x < W - 1; x++) {
        const i = y * W + x;
        const n = (y-1)*W+x, s = (y+1)*W+x;
        const ww = y*W+(x-1), e = y*W+(x+1);
        const spread = 0.05;
        vX[i] += (vX[n] + vX[s] + vX[ww] + vX[e] - vX[i] * 4) * spread;
        vY[i] += (vY[n] + vY[s] + vY[ww] + vY[e] - vY[i] * 4) * spread;
      }
    }
  }
}

/* ---- Render ---- */

function render() {
  const src = origData.data;
  const dst = outImgData.data;

  if (mode === 'velocity') {
    for (let i = 0; i < W * H; i++) {
      const speed = Math.sqrt(vX[i]*vX[i] + vY[i]*vY[i]);
      const j = i * 4;
      dst[j]   = Math.min(255, Math.abs(vX[i]) * 70 + speed * 20);
      dst[j+1] = Math.min(255, speed * 40);
      dst[j+2] = Math.min(255, Math.abs(vY[i]) * 70 + speed * 20);
      dst[j+3] = 255;
    }
    ctx.putImageData(outImgData, 0, 0);
    return;
  }

  // Normal + Ink: inverzné vzorkovanie
  // Výstupný pixel (x,y) berie farbu z originálu na pozícii (x - dX, y - dY)
  // Toto je korektný inverzný warp — bez dier, bez artefaktov
  for (let y = 0; y < H; y++) {
    for (let x = 0; x < W; x++) {
      const i  = y * W + x;

      // Zdrojová (originálna) pozícia pre tento výstupný pixel
      const sx = x - dX[i];
      const sy = y - dY[i];

      // Bilineárna interpolácia
      const x0 = sx | 0, y0 = sy | 0;
      const x1 = x0 + 1, y1 = y0 + 1;
      const fx = sx - x0, fy = sy - y0;

      const ax0 = x0 < 0 ? 0 : x0 >= W ? W-1 : x0;
      const ax1 = x1 < 0 ? 0 : x1 >= W ? W-1 : x1;
      const ay0 = y0 < 0 ? 0 : y0 >= H ? H-1 : y0;
      const ay1 = y1 < 0 ? 0 : y1 >= H ? H-1 : y1;

      const p00 = (ay0*W+ax0)*4, p10 = (ay0*W+ax1)*4;
      const p01 = (ay1*W+ax0)*4, p11 = (ay1*W+ax1)*4;

      const w00 = (1-fx)*(1-fy), w10 = fx*(1-fy);
      const w01 = (1-fx)*fy,     w11 = fx*fy;

      const j = i * 4;
      dst[j]   = src[p00]*w00 + src[p10]*w10 + src[p01]*w01 + src[p11]*w11;
      dst[j+1] = src[p00+1]*w00 + src[p10+1]*w10 + src[p01+1]*w01 + src[p11+1]*w11;
      dst[j+2] = src[p00+2]*w00 + src[p10+2]*w10 + src[p01+2]*w01 + src[p11+2]*w11;
      dst[j+3] = 255;

      if (mode === 'ink') {
        const speed = Math.min(1, Math.sqrt(vX[i]*vX[i]+vY[i]*vY[i]) * 0.6);
        if (speed > 0.02) {
          dst[j]   = dst[j]   * (1-speed) + 50  * speed;
          dst[j+1] = dst[j+1] * (1-speed) + 10  * speed;
          dst[j+2] = dst[j+2] * (1-speed) + 210 * speed;
        }
      }
    }
  }

  ctx.putImageData(outImgData, 0, 0);
}

/* ---- Hlavná slučka ---- */

function loop() {
  if (!running) return;
  frameCount++;

  if (mouse.down) {
    if (mouse.btn === 2) applyCalm();
    else applyForce();
  }

  // Ulož aktuálnu pozíciu ako "predchádzajúcu" pre ďalší frame
  mouse.px = mouse.x;
  mouse.py = mouse.y;

  step();
  render();

  const now = performance.now();
  fpsAcc += now - lastT; lastT = now; fpsCnt++;
  if (fpsAcc > 500) {
    fpsEl.textContent = Math.round(1000 / (fpsAcc / fpsCnt)) + ' FPS';
    fpsAcc = 0; fpsCnt = 0;
  }

  requestAnimationFrame(loop);
}

/* ---- Myš a touch ---- */

function toCanvas(e) {
  const r = canvas.getBoundingClientRect();
  return {
    x: (e.clientX - r.left) / r.width  * W,
    y: (e.clientY - r.top)  / r.height * H
  };
}

canvas.addEventListener('mousedown', e => {
  e.preventDefault();
  const p = toCanvas(e);
  mouse.x = mouse.px = p.x;
  mouse.y = mouse.py = p.y;
  mouse.down = true; mouse.btn = e.button;
});
canvas.addEventListener('mousemove', e => {
  const p = toCanvas(e);
  mouse.x = p.x; mouse.y = p.y;
});
window.addEventListener('mouseup', () => { mouse.down = false; });
canvas.addEventListener('contextmenu', e => e.preventDefault());

canvas.addEventListener('touchstart', e => {
  e.preventDefault();
  const p = toCanvas(e.touches[0]);
  mouse.x = mouse.px = p.x; mouse.y = mouse.py = p.y;
  mouse.down = true; mouse.btn = 0;
}, { passive: false });
canvas.addEventListener('touchmove', e => {
  e.preventDefault();
  const p = toCanvas(e.touches[0]);
  mouse.x = p.x; mouse.y = p.y;
}, { passive: false });
canvas.addEventListener('touchend', () => { mouse.down = false; });

/* ---- Drag and drop ---- */

fileInput.addEventListener('change', e => { if (e.target.files[0]) loadFile(e.target.files[0]); });

['dragenter','dragover'].forEach(ev => window.addEventListener(ev, e => {
  e.preventDefault(); dropzone.classList.add('dragover');
}));
['dragleave','drop'].forEach(ev => window.addEventListener(ev, e => {
  e.preventDefault(); dropzone.classList.remove('dragover');
}));
window.addEventListener('drop', e => {
  e.preventDefault();
  if (e.dataTransfer.files[0]) loadFile(e.dataTransfer.files[0]);
});

/* ---- Slidery a tlačidlá ---- */

function mkSlider(id, valId, cb) {
  const el = document.getElementById(id);
  const vl = document.getElementById(valId);
  el.addEventListener('input', () => cb(+el.value, vl));
}

mkSlider('sBrush',       'vBrush',       (v, el) => { brushSize   = v; el.textContent = v; });
mkSlider('sForce',       'vForce',       (v, el) => { forceMul    = v; el.textContent = v; });
mkSlider('sViscosity',   'vViscosity',   (v, el) => { viscosity   = v / 100; el.textContent = v; });
mkSlider('sMaxDisplace', 'vMaxDisplace', (v, el) => { maxDisplace = v; el.textContent = v + ' px'; });

document.querySelectorAll('.modes button').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.modes button').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    mode = btn.dataset.mode;
  });
});

document.getElementById('btnReset').addEventListener('click', resetSim);
document.getElementById('btnNew').addEventListener('click', () => fileInput.click());
document.getElementById('btnSave').addEventListener('click', () => {
  const a = document.createElement('a');
  a.download = 'fluid-image.png';
  a.href = canvas.toDataURL('image/png');
  a.click();
});
</script>
</body>
</html>
